<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Preeti ❤️</title>

<style>

body{
    margin:0;
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    font-family:Arial,sans-serif;
}

.container{
    text-align:center;
    color:white;
    z-index:2;
}

h1{
    font-size:45px;
    margin-bottom:20px;
}

.buttons{
    position:relative;
    width:300px;
    height:200px;
    margin:auto;
}

button{
    position:absolute;
    padding:15px 35px;
    border:none;
    border-radius:40px;
    font-size:22px;
    cursor:pointer;
}

#yesBtn{
    background:#ff1493;
    color:white;
    left:90px;
    top:40px;
}

#noBtn{
    background:white;
    left:100px;
    top:120px;
    font-size:40px;
}

#result{
    display:none;
}

.message{
    font-size:42px;
    color:white;
    text-shadow:0 0 20px #ff4da6;
}

.cat{
    font-size:140px;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

</style>
</head>

<body>

<canvas id="heart"></canvas>

<div class="container">

<div id="question">

<h1>Preeti, DO YOU LIKE ME? ❤️</h1>

<div class="buttons">

<button id="yesBtn">Yes 💖</button>

<button id="noBtn">NO</button>

</div>

</div>

<div id="result">

<div class="cat">I LOVE YOU</div>

<div class="message">
YAYYYYY ❤️<br>
I know DHALU YOU WILL TELL YES 💍💖<br><br>
You Are best person i ever meet in my life .I NEVER WANT TO LEAVE YOU 🌸
</div>

</div>

</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

noBtn.addEventListener("mouseover",()=>{

let x = Math.floor(Math.random()*250);
let y = Math.floor(Math.random()*150);

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

});

yesBtn.addEventListener("click",()=>{

document.getElementById("question").style.display="none";

document.getElementById("result").style.display="block";

startHeart();

});

function startHeart(){

const canvas = document.getElementById("heart");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function heartShape(t){
    return {
        x: 16 * Math.pow(Math.sin(t),3),
        y: -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t))
    };
}
S
for(let i=0;i<1000;i++){

    let t = Math.random()*Math.PI*2;

    let pos = heartShape(t);

    particles.push({
        x: canvas.width/2 + pos.x*20,
        y: canvas.height/2 + pos.y*20,
        size: Math.random()*3 + 1,
        alpha: Math.random()
    });
}

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{

        ctx.beginPath();

        ctx.fillStyle = "rgba(255,20,147,"+p.alpha+")";

        ctx.shadowBlur = 15;
        ctx.shadowColor = "#ff1493";

        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);

        ctx.fill();

    });

    requestAnimationFrame(animate);
}

animate();

}

</script>

</body>
</html>
